apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: backend-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3006
          envFrom:
            - secretRef:
                name: jwt-secret
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3006"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: MONGODB_URI_NOTIFICATION
            - name: CONSUL_HOST
              value: consul-service
            - name: CONSUL_PORT
              value: "8500"
            - name: SERVICE_HOST
              value: notification-service
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: mediconnect
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 3006
      targetPort: 3006
  type: ClusterIP
