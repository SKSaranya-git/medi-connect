apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatewayapi-service
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatewayapi-service
  template:
    metadata:
      labels:
        app: gatewayapi-service
    spec:
      containers:
        - name: gatewayapi-service
          image: backend-gatewayapi-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: jwt-secret
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3002"
            - name: CONSUL_HOST
              value: consul-service
            - name: CONSUL_PORT
              value: "8500"
            - name: SERVICE_HOST
              value: gatewayapi-service
            - name: APPOINTMENT_SERVICE_URL
              value: http://appointment-service:3000
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:3001
            - name: PATIENT_SERVICE_URL
              value: http://patient-service:3003
            - name: DOCTOR_SERVICE_URL
              value: http://doctor-service:3004
            - name: TELEMEDICINE_SERVICE_URL
              value: http://telemedicine-service:3005
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:3006
            - name: AI_SYMPTOM_SERVICE_URL
              value: http://ai-symptom-service:3007
            - name: ADMIN_SERVICE_URL
              value: http://admin-service:3008
---
apiVersion: v1
kind: Service
metadata:
  name: gatewayapi-service
  namespace: mediconnect
spec:
  selector:
    app: gatewayapi-service
  ports:
    - name: http
      port: 3002
      targetPort: 3002
  type: LoadBalancer
