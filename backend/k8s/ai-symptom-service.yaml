apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: backend-ai-symptom-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3007
          envFrom:
            - secretRef:
                name: jwt-secret
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3007"
            - name: CONSUL_HOST
              value: consul-service
            - name: CONSUL_PORT
              value: "8500"
            - name: SERVICE_HOST
              value: ai-symptom-service
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
  namespace: mediconnect
spec:
  selector:
    app: ai-symptom-service
  ports:
    - name: http
      port: 3007
      targetPort: 3007
  type: ClusterIP
